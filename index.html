<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Date ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div id="hearts"></div>

<div class="container">

<section id="page1" class="page active">

<h1>There's something I've been wanting to ask you...</h1>

<p class="subtitle">
Every beautiful story starts with one simple question.
</p>

<button id="continueBtn">
Continue ❤️
</button>

</section>

<section id="page2" class="page">

<h1 id="proposalText"></h1>

<button id="yesBtn">
Yes ❤️
</button>

</section>

<section id="page3" class="page">

<h2>
Choose the day that feels perfect for us ❤️
</h2>

<input type="date" id="datePicker">

<button id="calendarBtn">
Add to Google Calendar
</button>

</section>

<section id="page4" class="page collage-page">

<div class="overlay">

<h1>Thank you for saying Yes ❤️</h1>

<p>

I can't wait to make beautiful memories with you.

</p>

<h2>

Love you forever ❤️

</h2>

<div id="countdown"></div>

</div>

</section>

</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>

</body>
</html>
